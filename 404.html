<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found. The page you are looking for doesn't exist.">
  <meta name="robots" content="noindex, nofollow">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      color: #333;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 50px 20px;
    }
    h1 {
      font-size: 72px;
      color: #e74c3c;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      color: #555;
    }
    .button {
      display: inline-block;
      padding: 10px 20px;
      margin-top: 20px;
      background-color: #3498db;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
    }
    .button:hover {
      background-color: #2980b9;
    }
    .suggestions {
      margin-top: 40px;
    }
    .suggestions a {
      display: inline-block;
      margin: 10px;
      font-size: 16px;
      color: #3498db;
      text-decoration: none;
    }
    .suggestions a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! The page you are looking for could not be found.</p>
    <p>It might have been moved or deleted. Please check the URL or head back to our homepage.</p>
    
    <a href="/" class="button">Go to Homepage</a>
    
    <div class="suggestions">
      <p>Here are some useful links:</p>
      <a href="/blog">Latest Blogs</a>
      <a href="/about">About Us</a>
      <a href="/contact">Contact Us</a>
      <a href="/services">Our Services</a>
    </div>
  </div>
</body>
</html>
